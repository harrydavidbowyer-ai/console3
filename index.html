<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FeelForm OS — Solar‑Flare Edition</title>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ========================= -->
    <!--   FEELFORM OS CONTAINER   -->
    <!-- ========================= -->
    <div id="feelform-os">

        <!-- ========================= -->
        <!--        CONSOLE UI         -->
        <!-- ========================= -->
        <button id="console-toggle" class="console-toggle">CONSOLE</button>

        <div id="console" class="console hidden">

            <!-- NAVIGATION -->
            <nav class="console-nav">
                <ul>
                    <li data-panel="identity">Identity</li>
                    <li data-panel="ritual">Ritual</li>
                    <li data-panel="memory">Memory</li>
                </ul>
            </nav>

            <!-- PANELS -->
            <div class="console-panels">

                <!-- IDENTITY PANEL -->
                <section id="identity" class="console-panel hidden">
                    <h2>Identity</h2>
                    <div class="identity-content"></div>
                </section>

                <!-- RITUAL PANEL -->
                <section id="ritual" class="console-panel hidden">
                    <h2>Ritual</h2>
                    <div class="ritual-content"></div>
                </section>

                <!-- MEMORY PANEL -->
                <section id="memory" class="console-panel hidden">
                    <h2>Memory</h2>
                    <div class="memory-content"></div>
                </section>

            </div>
        </div>

        <!-- ========================= -->
        <!--       CHAMBER SYSTEM      -->
        <!-- ========================= -->
        <div id="chambers">

            <!-- Example Chamber -->
            <div class="chamber" id="chamber-core">
                <div class="chamber-content">
                    <h1>Core Chamber</h1>
                    <p>The heart of the FeelForm OS organism.</p>
                </div>
            </div>

            <!-- Add more chambers as needed -->
        </div>

        <!-- ========================= -->
        <!--       OVERLAY SYSTEM      -->
        <!-- ========================= -->
        <div id="overlay" class="overlay hidden">
            <div class="overlay-content"></div>
        </div>

    </div>

    <!-- ========================= -->
    <!--         SCRIPT JS         -->
    <!-- ========================= -->
    <script src="script.js"></script>

</body>
</html>
