<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FeelForm OS — Fixed</title>

<style>
body { background:#0d0d0f; color:#e6e6e6; font-family:Arial; margin:0; }
.console-toggle { position:fixed; top:20px; right:20px; padding:10px 20px; border:1px solid #ff8c00; background:rgba(255,255,255,0.05); color:#ff8c00; cursor:pointer; }
.console { position:fixed; top:0; right:0; width:350px; height:100vh; background:#1a1a1d; border-left:1px solid #ff8c00; transform:translateX(100%); transition:0.3s; padding-top:60px; }
.console.visible { transform:translateX(0); }
.console-nav li { padding:12px 20px; cursor:pointer; }
.console-panel { display:none; padding:20px; }
.console-panel.visible { display:block; }
.chamber { background:rgba(255,255,255,0.05); border:1px solid #ff8c00; padding:40px; margin:40px; cursor:pointer; }
.overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(13,13,15,0.85); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:0.3s; }
.overlay.showing { opacity:1 !important; pointer-events:auto !important; }
.overlay-content { background:rgba(255,255,255,0.05); border:1px solid #ff8c00; padding:40px; border-radius:10px; }
</style>
</head>

<body>

<button id="console-toggle" class="console-toggle">CONSOLE</button>

<div id="console" class="console">
    <nav class="console-nav">
        <ul>
            <li data-panel="identity">Identity</li>
            <li data-panel="ritual">Ritual</li>
            <li data-panel="memory">Memory</li>
        </ul>
    </nav>

    <div class="console-panels">
        <section id="identity" class="console-panel"><h2>Identity</h2></section>
        <section id="ritual" class="console-panel"><h2>Ritual</h2></section>
        <section id="memory" class="console-panel"><h2>Memory</h2></section>
    </div>
</div>

<div class="chamber" id="chamber-core">
    <h1>Core Chamber</h1>
    <p>The heart of the OS.</p>
</div>

<div id="overlay" class="overlay">
    <div class="overlay-content"></div>
</div>

<script>
console.log("SCRIPT LOADED");

/* CONSOLE */
const consoleToggle = document.getElementById("console-toggle");
const consoleEl = document.getElementById("console");
const navItems = document.querySelectorAll(".console-nav li");
const panels = document.querySelectorAll(".console-panel");

consoleToggle.addEventListener("click", () => {
    consoleEl.classList.toggle("visible");
});

navItems.forEach(item => {
    item.addEventListener("click", () => {
        const target = item.dataset.panel;
        panels.forEach(p => p.classList.remove("visible"));
        document.getElementById(target).classList.add("visible");
    });
});

/* OVERLAY */
const overlay = document.getElementById("overlay");
const overlayContent = document.querySelector(".overlay-content");

function showOverlay(content) {
    overlayContent.innerHTML = content;
    overlay.classList.add("showing");
}

overlay.addEventListener("click", () => {
    overlay.classList.remove("showing");
});

/* CHAMBERS */
document.getElementById("chamber-core").addEventListener("click", () => {
    showOverlay("<h2>Core Chamber Activated</h2>");
});
</script>

</body>
</html>
