<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FeelForm OS — Single File</title>

    <style>
        body {
            background: #0d0d0f;
            color: #e6e6e6;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .console-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #ff8c00;
            color: #ff8c00;
            padding: 10px 20px;
            cursor: pointer;
        }

        .console {
            position: fixed;
            top: 0;
            right: 0;
            width: 350px;
            height: 100vh;
            background: #1a1a1d;
            border-left: 1px solid #ff8c00;
            transform: translateX(100%);
            transition: 0.3s ease;
            padding-top: 60px;
        }

        .console.visible {
            transform: translateX(0);
        }

        .console-nav ul {
            list-style: none;
            padding: 0;
        }

        .console-nav li {
            padding: 12px 20px;
            cursor: pointer;
        }

        .console-panel {
            display: none;
            padding: 20px;
        }

        .console-panel.visible {
            display: block;
        }

        #chambers {
            padding: 40px;
            margin-top: 100px;
        }

        .chamber {
            background: rgba(255,255,255,0.05);
            border: 1px solid #ff8c00;
            padding: 40px;
            margin-bottom: 40px;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13,13,15,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: 0.3s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-content {
            background: rgba(255,255,255,0.05);
            border: 1px solid #ff8c00;
            padding: 40px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <button id="console-toggle" class="console-toggle">CONSOLE</button>

    <div id="console" class="console">
        <nav class="console-nav">
            <ul>
                <li data-panel="identity">Identity</li>
                <li data-panel="ritual">Ritual</li>
                <li data-panel="memory">Memory</li>
            </ul>
        </nav>

        <div class="console-panels">
            <section id="identity" class="console-panel">
                <h2>Identity</h2>
            </section>

            <section id="ritual" class="console-panel">
                <h2>Ritual</h2>
            </section>

            <section id="memory" class="console-panel">
                <h2>Memory</h2>
            </section>
        </div>
    </div>

    <div id="chambers">
        <div class="chamber" id="chamber-core">
            <h1>Core Chamber</h1>
            <p>The heart of the OS.</p>
        </div>
    </div>

    <div id="overlay" class="overlay hidden">
        <div class="overlay-content"></div>
    </div>

    <script>
        console.log("SCRIPT LOADED");

        /* EVENT BUS */
        const EventBus = {
            events: {},
            on(event, handler) {
                if (!this.events[event]) this.events[event] = [];
                this.events[event].push(handler);
            },
            emit(event, data) {
                if (this.events[event]) {
                    this.events[event].forEach(h => h(data));
                }
            }
        };

        /* CONSOLE ENGINE */
        const consoleToggle = document.getElementById("console-toggle");
        const consoleEl = document.getElementById("console");
        const navItems = document.querySelectorAll(".console-nav li");
        const panels = document.querySelectorAll(".console-panel");

        consoleToggle.addEventListener("click", () => {
            consoleEl.classList.toggle("visible");
        });

        navItems.forEach(item => {
            item.addEventListener("click", () => {
                const target = item.dataset.panel;

                panels.forEach(p => p.classList.remove("visible"));
                document.getElementById(target).classList.add("visible");
            });
        });

        /* CHAMBER ENGINE */
        const chambers = document.querySelectorAll(".chamber");

        chambers.forEach(chamber => {
            chamber.addEventListener("click", () => {
                EventBus.emit("overlay", `<h2>${chamber.id}</h2>`);
            });
        });

        /* OVERLAY ENGINE */
        const overlay = document.getElementById("overlay");
        const overlayContent = document.querySelector(".overlay-content");

        EventBus.on("overlay", content => {
            overlayContent.innerHTML = content;
            overlay.classList.remove("hidden");
        });

        overlay.addEventListener("click", () => {
            overlay.classList.add("hidden");
        });
    </script>

</body>
</html>
